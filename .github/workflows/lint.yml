name: Linter Check

on:
  push:
    branches: main

  pull_request:
    branches: main

      
jobs:
  Lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Linter
        run: pip install flake8
       
      - name: Run Linter
        run: flake8 tests/
