name: Build Test 

on:
  push:
    branches: main

  pull_request:
    branches: main


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest


      - name: Run pytrest
        run: |
           echo "Running pytest from repo root"
           export PYTHONPATH=$PYTHONPATH:$GITHUB_WORKSPACE
           pytest

